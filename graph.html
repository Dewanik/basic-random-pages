<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GraphCluster Smooth</title>
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'GraphCluster','short_name':'Graph','start_url':'.','display':'standalone','background_color':'#f8fafc','theme_color':'#2563eb'}">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { touch-action: none; overflow: hidden; background: #f8fafc; font-family: system-ui, sans-serif; user-select: none; }
        
        /* Smooth UI Transitions */
        .node { cursor: grab; transition: filter 0.2s; }
        .node:active { cursor: grabbing; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.15)); }
        .node circle { transition: r 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .node:active circle { r: 35; } /* Grow slightly when dragging */
        
        .link { stroke: #cbd5e1; stroke-width: 2.5; stroke-linecap: round; transition: opacity 0.3s; }
        .hidden-element { opacity: 0 !important; pointer-events: none; }
        
        #canvas { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .editor-sheet { transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.3, 1, 0.3, 1); }
        .editor-sheet.active { transform: translateY(0); }
        
        /* Floating Action Button */
        .fab { position: fixed; bottom: 85px; right: 20px; z-index: 20; transition: transform 0.2s; }
        .fab:active { transform: scale(0.9); }
    </style>
</head>
<body class="flex flex-col">

    <header class="bg-white/90 backdrop-blur-md text-gray-800 p-4 shadow-sm z-30 flex justify-between items-center border-b border-gray-200 absolute top-0 w-full">
        <div class="flex flex-col">
            <h1 class="font-extrabold text-lg text-blue-600 tracking-tight">GraphCluster</h1>
            <div class="flex items-center gap-2 mt-1">
                <span class="text-xs font-bold text-gray-400 uppercase">Adding to:</span>
                <select id="active-cluster-select" onchange="changeActiveCluster()" class="bg-gray-100 text-sm font-bold px-2 py-1 rounded-md outline-none border-none text-gray-700"></select>
            </div>
        </div>
        <button onclick="addNewCluster()" class="bg-blue-50 text-blue-600 px-3 py-2 rounded-xl text-xs font-bold border border-blue-100 active:bg-blue-100">+ New Cluster</button>
    </header>

    <svg id="canvas">
        <g id="links-group"></g>
        <g id="nodes-group"></g>
    </svg>

    <button onclick="addNode()" class="fab bg-blue-600 shadow-lg shadow-blue-300 text-white w-14 h-14 rounded-full flex items-center justify-center text-3xl font-light pb-1">
        +
    </button>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 p-4 pb-6 z-10 shadow-[0_-10px_30px_rgba(0,0,0,0.03)]">
        <p class="text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest pl-1">Visibility Filters</p>
        <div id="visibility-list" class="flex gap-2 overflow-x-auto hide-scrollbar pb-1"></div>
    </div>

    <div id="editor" class="editor-sheet fixed inset-0 z-40 flex flex-col justify-end pointer-events-none">
        <div class="bg-black/30 h-full w-full pointer-events-auto backdrop-blur-sm transition-opacity" onclick="closeEditor()"></div>
        <div class="bg-white rounded-t-3xl p-6 shadow-2xl pointer-events-auto max-h-[85vh] flex flex-col">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
            
            <div class="space-y-5 overflow-y-auto pb-4">
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase mb-1">Node Name</label>
                    <input type="text" id="edit-name" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 focus:border-blue-500 focus:bg-white transition outline-none font-medium">
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase mb-1">Assigned Cluster</label>
                    <select id="edit-cluster" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 outline-none font-medium text-gray-700"></select>
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase mb-1">Notes</label>
                    <textarea id="edit-notes" rows="3" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 outline-none transition focus:bg-white focus:border-blue-500 resize-none text-sm" placeholder="Tap to add details..."></textarea>
                </div>

                <div class="flex gap-3 pt-2">
                    <button onclick="saveNode()" class="flex-1 bg-blue-600 active:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-md transition">Save</button>
                    <button onclick="deleteNode()" class="bg-red-50 active:bg-red-100 text-red-500 font-bold px-6 py-3.5 rounded-xl transition">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- State Management ---
        let clusters = { 'Idea 1': '#3b82f6', 'Idea 2': '#10b981' };
        let activeCluster = 'Idea 1';
        let hiddenClusters = new Set();
        let activeNodeId = null;

        let nodes = [
            { id: 1, x: window.innerWidth/2, y: window.innerHeight/2 - 50, cluster: 'Idea 1', label: 'Start Here', notes: '' }
        ];
        let links = [];

        const nodesGroup = document.getElementById('nodes-group');
        const linksGroup = document.getElementById('links-group');
        
        // --- Render Engine ---
        function render() {
            nodesGroup.innerHTML = ''; linksGroup.innerHTML = '';
            
            // Draw Links
            links.forEach(link => {
                const s = nodes.find(n => n.id === link.source);
                const t = nodes.find(n => n.id === link.target);
                if (!s || !t) return;
                
                const isHidden = hiddenClusters.has(s.cluster) || hiddenClusters.has(t.cluster);
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", s.x); line.setAttribute("y1", s.y);
                line.setAttribute("x2", t.x); line.setAttribute("y2", t.y);
                line.setAttribute("class", `link ${isHidden ? 'hidden-element' : ''}`);
                linksGroup.appendChild(line);
            });

            // Draw Nodes
            nodes.forEach(node => {
                const isHidden = hiddenClusters.has(node.cluster);
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                g.setAttribute("class", `node ${isHidden ? 'hidden-element' : ''}`);
                g.setAttribute("transform", `translate(${node.x}, ${node.y})`);
                
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("r", 32);
                circle.setAttribute("fill", clusters[node.cluster] || '#94a3b8');
                circle.setAttribute("stroke", "#ffffff");
                circle.setAttribute("stroke-width", "4");

                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.textContent = node.label.length > 9 ? node.label.substring(0, 8) + '…' : node.label;
                text.setAttribute("dy", 4);
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("class", "text-[11px] font-bold fill-white pointer-events-none");

                g.append(circle, text);
                setupDragAndClick(g, node);
                nodesGroup.appendChild(g);
            });

            updateUI();
        }

        function updateUI() {
            // Update Active Cluster Dropdown
            const activeSelect = document.getElementById('active-cluster-select');
            activeSelect.innerHTML = '';
            Object.keys(clusters).forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.textContent = c;
                if(c === activeCluster) opt.selected = true;
                activeSelect.appendChild(opt);
            });

            // Update Bottom Visibility Filters
            const visList = document.getElementById('visibility-list');
            visList.innerHTML = '';
            Object.keys(clusters).forEach(name => {
                const btn = document.createElement('button');
                const isHidden = hiddenClusters.has(name);
                btn.className = `flex items-center gap-2 px-4 py-2 rounded-full border-2 whitespace-nowrap transition text-xs font-bold ${isHidden ? 'bg-gray-50 border-gray-200 text-gray-400' : 'bg-white border-gray-100 text-gray-800 shadow-sm'}`;
                btn.innerHTML = `<span style="width:12px;height:12px;border-radius:50%;background:${isHidden ? '#cbd5e1' : clusters[name]}"></span> ${name}`;
                btn.onclick = () => {
                    isHidden ? hiddenClusters.delete(name) : hiddenClusters.add(name);
                    render();
                };
                visList.appendChild(btn);
            });
        }

        // --- Core Interactions ---
        function changeActiveCluster() {
            activeCluster = document.getElementById('active-cluster-select').value;
        }

        function addNode() {
            // Ensure the active cluster is visible when adding
            hiddenClusters.delete(activeCluster); 
            
            const id = Date.now();
            // Connect ONLY to the last node in the SAME cluster
            const clusterNodes = nodes.filter(n => n.cluster === activeCluster);
            const lastNodeInCluster = clusterNodes[clusterNodes.length - 1];

            // Offset slightly from the center so they don't stack perfectly
            const offset = (clusterNodes.length % 5) * 15;
            
            const newNode = {
                id: id,
                x: window.innerWidth / 2 + offset,
                y: window.innerHeight / 2 + offset,
                cluster: activeCluster,
                label: 'New Node',
                notes: ''
            };
            
            nodes.push(newNode);
            if (lastNodeInCluster) links.push({ source: lastNodeInCluster.id, target: id });
            
            render();
            openEditor(newNode); // Immediately let them type a name
        }

        function addNewCluster() {
            const name = prompt("Enter a short name for the new cluster:");
            if (name && name.trim() !== '' && !clusters[name]) {
                const colors = ['#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4', '#14b8a6', '#f43f5e'];
                clusters[name] = colors[Object.keys(clusters).length % colors.length];
                activeCluster = name; // Auto-switch to the new cluster
                render();
            }
        }

        // --- Smooth Drag vs Click Logic ---
        function setupDragAndClick(element, node) {
            let startX, startY, isDragging = false;

            const onStart = (e) => {
                const evt = e.touches ? e.touches[0] : e;
                startX = evt.clientX; startY = evt.clientY;
                isDragging = false;

                document.addEventListener('mousemove', onMove);
                document.addEventListener('touchmove', onMove, {passive: false});
                document.addEventListener('mouseup', onEnd);
                document.addEventListener('touchend', onEnd);
            };

            const onMove = (e) => {
                const evt = e.touches ? e.touches[0] : e;
                const dx = evt.clientX - startX;
                const dy = evt.clientY - startY;
                
                // If moved more than 5px, it's a drag, not a tap
                if (!isDragging && Math.hypot(dx, dy) > 5) {
                    isDragging = true;
                }

                if (isDragging) {
                    e.preventDefault(); // Prevent scrolling while dragging
                    node.x = evt.clientX;
                    node.y = evt.clientY;
                    render(); // Update positions
                }
            };

            const onEnd = () => {
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('mouseup', onEnd);
                document.removeEventListener('touchend', onEnd);
                
                // If we didn't drag, it was a click/tap! Open editor.
                if (!isDragging) openEditor(node);
            };

            element.addEventListener('mousedown', onStart);
            element.addEventListener('touchstart', onStart, {passive: false});
        }

        // --- Editor Sheet ---
        function openEditor(node) {
            activeNodeId = node.id;
            document.getElementById('edit-name').value = node.label;
            document.getElementById('edit-notes').value = node.notes || '';
            
            const select = document.getElementById('edit-cluster');
            select.innerHTML = '';
            Object.keys(clusters).forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.textContent = c;
                if(c === node.cluster) opt.selected = true;
                select.appendChild(opt);
            });

            document.getElementById('editor').classList.add('active');
        }

        function saveNode() {
            const node = nodes.find(n => n.id === activeNodeId);
            if (node) {
                node.label = document.getElementById('edit-name').value;
                node.notes = document.getElementById('edit-notes').value;
                const oldCluster = node.cluster;
                node.cluster = document.getElementById('edit-cluster').value;
                
                // If cluster changed, we break its links so it doesn't cross-contaminate
                if (oldCluster !== node.cluster) {
                    links = links.filter(l => l.source !== node.id && l.target !== node.id);
                }
            }
            closeEditor();
            render();
        }

        function deleteNode() {
            nodes = nodes.filter(n => n.id !== activeNodeId);
            links = links.filter(l => l.source !== activeNodeId && l.target !== activeNodeId);
            closeEditor();
            render();
        }

        function closeEditor() { document.getElementById('editor').classList.remove('active'); activeNodeId = null; }

        // Initialize
        render();
    </script>
</body>
</html>
