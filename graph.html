<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GraphCluster Pro Max</title>
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'GraphCluster','short_name':'Graph','start_url':'.','display':'standalone','background_color':'#f8fafc','theme_color':'#2563eb'}">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { touch-action: none; overflow: hidden; background: #f8fafc; font-family: system-ui, sans-serif; user-select: none; -webkit-user-select: none; }
        
        /* Hardware Acceleration & Smooth Transitions */
        .node { cursor: grab; will-change: transform; }
        .node:active { cursor: grabbing; }
        .node circle { transition: r 0.2s cubic-bezier(0.4, 0, 0.2, 1), filter 0.2s; }
        .node:active circle { r: 35; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.2)); }
        
        .link { stroke: #cbd5e1; stroke-width: 2.5; stroke-linecap: round; will-change: d; transition: opacity 0.3s; }
        .hidden-element { opacity: 0 !important; pointer-events: none; }
        
        #canvas { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; cursor: grab; }
        #canvas:active { cursor: grabbing; }
        
        .editor-sheet { transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.3, 1, 0.3, 1); }
        .editor-sheet.active { transform: translateY(0); }
        
        /* Floating Controls */
        .fab { position: fixed; bottom: 95px; right: 20px; z-index: 20; transition: transform 0.2s; }
        .fab:active { transform: scale(0.9); }
        
        .zoom-controls { position: fixed; left: 20px; bottom: 95px; z-index: 20; display: flex; flex-direction: column; gap: 8px; }
        .zoom-btn { background: white; border: 1px solid #e2e8f0; width: 40px; height: 40px; border-radius: 12px; font-size: 20px; font-weight: bold; color: #475569; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .zoom-btn:active { background: #f1f5f9; transform: scale(0.95); }
    </style>
</head>
<script data-goatcounter="https://kdewanik.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
<body class="flex flex-col">

    <header class="bg-white/95 backdrop-blur-md p-3 shadow-sm z-30 flex flex-col gap-2 border-b border-gray-200 absolute top-0 w-full">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Scene:</span>
                <select id="scene-select" onchange="switchScene()" class="bg-blue-50 text-blue-700 text-sm font-extrabold px-2 py-1 rounded-md outline-none border border-blue-100"></select>
            </div>
            <button onclick="addScene()" class="bg-gray-100 text-gray-600 px-3 py-1.5 rounded-lg text-xs font-bold active:bg-gray-200">+ New Scene</button>
        </div>
        
        <div class="flex justify-between items-center border-t border-gray-100 pt-2">
            <div class="flex items-center gap-2">
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Cluster:</span>
                <select id="active-cluster-select" onchange="changeActiveCluster()" class="bg-gray-50 text-gray-700 text-xs font-bold px-2 py-1 rounded-md outline-none"></select>
            </div>
            <button onclick="addNewCluster()" class="text-blue-500 px-2 py-1 text-xs font-bold active:opacity-50">+ Add Cluster</button>
        </div>
    </header>

    <svg id="canvas">
        <g id="camera-layer">
            <g id="links-group"></g>
            <g id="nodes-group"></g>
        </g>
    </svg>

    <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoom(1.2)">+</button>
        <button class="zoom-btn" onclick="zoom(0.8)">−</button>
    </div>

    <button onclick="addNode()" class="fab bg-blue-600 shadow-xl shadow-blue-300 text-white w-14 h-14 rounded-full flex items-center justify-center text-3xl font-light pb-1">
        +
    </button>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 p-4 pb-6 z-10 shadow-[0_-10px_30px_rgba(0,0,0,0.03)]">
        <p class="text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest pl-1">Visible Clusters</p>
        <div id="visibility-list" class="flex gap-2 overflow-x-auto hide-scrollbar pb-1"></div>
    </div>

    <div id="editor" class="editor-sheet fixed inset-0 z-40 flex flex-col justify-end pointer-events-none">
        <div class="bg-black/30 h-full w-full pointer-events-auto backdrop-blur-[2px] transition-opacity" onclick="closeEditor()"></div>
        <div class="bg-white rounded-t-3xl p-6 shadow-2xl pointer-events-auto max-h-[85vh] flex flex-col">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
            
            <div class="space-y-4 overflow-y-auto pb-4">
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase mb-1">Node Name</label>
                    <input type="text" id="edit-name" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 focus:border-blue-500 outline-none font-medium">
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase mb-1">Assigned Cluster</label>
                    <select id="edit-cluster" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 outline-none font-medium text-gray-700"></select>
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase mb-1">Notes</label>
                    <textarea id="edit-notes" rows="4" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 outline-none resize-none text-sm"></textarea>
                </div>

                <div class="flex gap-3 pt-2">
                    <button onclick="saveNode()" class="flex-1 bg-blue-600 active:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-md">Save Changes</button>
                    <button onclick="deleteNode()" class="bg-red-50 active:bg-red-100 text-red-500 font-bold px-5 py-3.5 rounded-xl">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Multi-Scene Data Architecture ---
        let appData = {
            activeSceneId: 1,
            scenes: [
                {
                    id: 1, name: 'Project Alpha',
                    clusters: { 'Concept': '#3b82f6', 'Design': '#10b981' },
                    activeCluster: 'Concept',
                    hiddenClusters: new Set(),
                    nodes: [{ id: 1, x: window.innerWidth/2, y: window.innerHeight/2, cluster: 'Concept', label: 'Main Idea', notes: '' }],
                    links: []
                }
            ]
        };

        // --- Offline Persistence Logic ---
        const STORAGE_KEY = 'graphCluster_ProMax_Data';

        function saveData() {
            // Convert Sets to Arrays for JSON serialization
            const dataToSave = {
                activeSceneId: appData.activeSceneId,
                scenes: appData.scenes.map(scene => ({
                    ...scene,
                    hiddenClusters: Array.from(scene.hiddenClusters)
                }))
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(dataToSave));
        }

        function loadData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    // Reconstruct Arrays back into Sets
                    parsed.scenes.forEach(scene => {
                        scene.hiddenClusters = new Set(scene.hiddenClusters || []);
                    });
                    appData = parsed;
                } catch (e) {
                    console.error("Failed to load local data", e);
                }
            }
        }

        // Camera / Viewport State
        let cam = { x: 0, y: 0, z: 1 };
        let activeNodeId = null;
        let isUIInteracting = false; 

        // DOM Elements
        const cameraLayer = document.getElementById('camera-layer');
        const nodesGroup = document.getElementById('nodes-group');
        const linksGroup = document.getElementById('links-group');
        const canvas = document.getElementById('canvas');

        // Helper to get active scene data
        const getScene = () => appData.scenes.find(s => s.id === appData.activeSceneId);

        // --- Core Rendering Engine ---
        function renderAll() {
            const scene = getScene();
            nodesGroup.innerHTML = ''; linksGroup.innerHTML = '';
            
            // Draw Links
            scene.links.forEach(link => {
                const s = scene.nodes.find(n => n.id === link.source);
                const t = scene.nodes.find(n => n.id === link.target);
                if (!s || !t) return;
                
                const isHidden = scene.hiddenClusters.has(s.cluster) || scene.hiddenClusters.has(t.cluster);
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", s.x); line.setAttribute("y1", s.y);
                line.setAttribute("x2", t.x); line.setAttribute("y2", t.y);
                line.setAttribute("class", `link ${isHidden ? 'hidden-element' : ''}`);
                
                link.element = line; // Store DOM reference for 0-lag drag updates
                linksGroup.appendChild(line);
            });

            // Draw Nodes
            scene.nodes.forEach(node => {
                const isHidden = scene.hiddenClusters.has(node.cluster);
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                g.setAttribute("class", `node ${isHidden ? 'hidden-element' : ''}`);
                g.setAttribute("transform", `translate(${node.x}, ${node.y})`);
                
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("r", 30);
                circle.setAttribute("fill", scene.clusters[node.cluster] || '#94a3b8');
                circle.setAttribute("stroke", "#ffffff");
                circle.setAttribute("stroke-width", "4");

                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.textContent = node.label.length > 9 ? node.label.substring(0, 8) + '…' : node.label;
                text.setAttribute("dy", 4);
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("class", "text-[11px] font-bold fill-white pointer-events-none");

                g.append(circle, text);
                node.element = g; 

                setupNodeInteractions(g, node);
                nodesGroup.appendChild(g);
            });

            updateUIControls();
            applyCamera();
        }

        function updateUIControls() {
            const scene = getScene();
            
            // Scenes Dropdown
            const sceneSel = document.getElementById('scene-select');
            sceneSel.innerHTML = '';
            appData.scenes.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.id; opt.textContent = s.name;
                if(s.id === appData.activeSceneId) opt.selected = true;
                sceneSel.appendChild(opt);
            });

            // Active Cluster Dropdown
            const clusSel = document.getElementById('active-cluster-select');
            clusSel.innerHTML = '';
            Object.keys(scene.clusters).forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.textContent = c;
                if(c === scene.activeCluster) opt.selected = true;
                clusSel.appendChild(opt);
            });

            // Visibility Toggles (Bottom)
            const visList = document.getElementById('visibility-list');
            visList.innerHTML = '';
            Object.keys(scene.clusters).forEach(name => {
                const btn = document.createElement('button');
                const isHidden = scene.hiddenClusters.has(name);
                btn.className = `flex items-center gap-2 px-4 py-2 rounded-full border-2 whitespace-nowrap transition text-xs font-bold ${isHidden ? 'bg-gray-50 border-gray-200 text-gray-400' : 'bg-white border-gray-100 text-gray-800 shadow-sm'}`;
                btn.innerHTML = `<span style="width:12px;height:12px;border-radius:50%;background:${isHidden ? '#cbd5e1' : scene.clusters[name]}"></span> ${name}`;
                btn.onclick = () => {
                    isHidden ? scene.hiddenClusters.delete(name) : scene.hiddenClusters.add(name);
                    renderAll();
                    saveData(); // Save state on toggle
                };
                visList.appendChild(btn);
            });
        }

        // --- Zero-Lag Drag Logic (Direct DOM Update) ---
        function setupNodeInteractions(element, node) {
            let startX, startY, isDragging = false;
            
            const onStart = (e) => {
                e.stopPropagation(); 
                isUIInteracting = true;
                const evt = e.touches ? e.touches[0] : e;
                startX = evt.clientX; startY = evt.clientY;
                isDragging = false;

                document.addEventListener('mousemove', onMove);
                document.addEventListener('touchmove', onMove, {passive: false});
                document.addEventListener('mouseup', onEnd);
                document.addEventListener('touchend', onEnd);
            };

            const onMove = (e) => {
                const evt = e.touches ? e.touches[0] : e;
                const dx = (evt.clientX - startX) / cam.z; 
                const dy = (evt.clientY - startY) / cam.z;
                
                if (!isDragging && Math.hypot(dx * cam.z, dy * cam.z) > 4) isDragging = true;

                if (isDragging) {
                    e.preventDefault(); 
                    node.x += dx; node.y += dy;
                    startX = evt.clientX; startY = evt.clientY;
                    
                    element.setAttribute("transform", `translate(${node.x}, ${node.y})`);
                    
                    getScene().links.forEach(l => {
                        if(l.source === node.id && l.element) { l.element.setAttribute('x1', node.x); l.element.setAttribute('y1', node.y); }
                        if(l.target === node.id && l.element) { l.element.setAttribute('x2', node.x); l.element.setAttribute('y2', node.y); }
                    });
                }
            };

            const onEnd = () => {
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('mouseup', onEnd);
                document.removeEventListener('touchend', onEnd);
                setTimeout(() => isUIInteracting = false, 50);
                
                if (!isDragging) {
                    openEditor(node);
                } else {
                    saveData(); // Save new positions after a drag ends
                }
            };

            element.addEventListener('mousedown', onStart);
            element.addEventListener('touchstart', onStart, {passive: false});
        }

        // --- Camera & Canvas Interactions (Pan/Zoom) ---
        function applyCamera() {
            cameraLayer.setAttribute("transform", `translate(${cam.x}, ${cam.y}) scale(${cam.z})`);
        }

        function zoom(factor) {
            cam.z = Math.max(0.2, Math.min(3, cam.z * factor));
            applyCamera();
        }

        let isPanning = false, panStartX, panStartY, camStartX, camStartY;
        let initialPinchDist = 0, initialPinchZoom = 1;

        canvas.addEventListener('pointerdown', e => {
            if (e.target === canvas || e.target === cameraLayer) {
                isPanning = true;
                panStartX = e.clientX; panStartY = e.clientY;
                camStartX = cam.x; camStartY = cam.y;
            }
        });

        window.addEventListener('pointermove', e => {
            if (isPanning && !isUIInteracting) {
                cam.x = camStartX + (e.clientX - panStartX);
                cam.y = camStartY + (e.clientY - panStartY);
                applyCamera();
            }
        });

        window.addEventListener('pointerup', () => isPanning = false);

        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            zoom(e.deltaY < 0 ? 1.1 : 0.9);
        }, {passive: false});

        canvas.addEventListener('touchstart', e => {
            if(e.touches.length === 2) {
                isPanning = false;
                initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                initialPinchZoom = cam.z;
            }
        });

        canvas.addEventListener('touchmove', e => {
            if(e.touches.length === 2) {
                e.preventDefault();
                let dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                cam.z = Math.max(0.2, Math.min(3, initialPinchZoom * (dist / initialPinchDist)));
                applyCamera();
            }
        }, {passive: false});


        // --- Scene & Data Management ---
        function addScene() {
            const name = prompt("Name your new Scene:");
            if(name) {
                const newScene = {
                    id: Date.now(), name: name,
                    clusters: { 'Default': '#8b5cf6' },
                    activeCluster: 'Default',
                    hiddenClusters: new Set(),
                    nodes: [{ id: Date.now(), x: window.innerWidth/2, y: window.innerHeight/2, cluster: 'Default', label: 'Start', notes: '' }],
                    links: []
                };
                appData.scenes.push(newScene);
                appData.activeSceneId = newScene.id;
                cam = {x:0, y:0, z:1}; 
                renderAll();
                saveData(); // Save new scene
            }
        }

        function switchScene() {
            appData.activeSceneId = parseInt(document.getElementById('scene-select').value);
            cam = {x:0, y:0, z:1}; 
            renderAll();
            saveData(); // Save active scene preference
        }

        function changeActiveCluster() {
            getScene().activeCluster = document.getElementById('active-cluster-select').value;
            saveData(); // Save active cluster preference
        }

        function addNewCluster() {
            const name = prompt("New cluster name:");
            const scene = getScene();
            if (name && !scene.clusters[name]) {
                const colors = ['#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4', '#14b8a6', '#f43f5e'];
                scene.clusters[name] = colors[Object.keys(scene.clusters).length % colors.length];
                scene.activeCluster = name;
                renderAll();
                saveData(); // Save new cluster
            }
        }

        function addNode() {
            const scene = getScene();
            scene.hiddenClusters.delete(scene.activeCluster); 
            
            const spawnX = (window.innerWidth / 2 - cam.x) / cam.z;
            const spawnY = (window.innerHeight / 2 - cam.y) / cam.z;

            const clusterNodes = scene.nodes.filter(n => n.cluster === scene.activeCluster);
            const lastNode = clusterNodes[clusterNodes.length - 1];
            const offset = (clusterNodes.length % 4) * 20; 
            
            const newNode = {
                id: Date.now(),
                x: spawnX + offset, y: spawnY + offset,
                cluster: scene.activeCluster, label: 'New Node', notes: ''
            };
            
            scene.nodes.push(newNode);
            if (lastNode) scene.links.push({ source: lastNode.id, target: newNode.id });
            
            renderAll();
            openEditor(newNode);
            saveData(); // Save new node
        }

        // --- Node Editor ---
        function openEditor(node) {
            activeNodeId = node.id;
            const scene = getScene();
            
            document.getElementById('edit-name').value = node.label;
            document.getElementById('edit-notes').value = node.notes || '';
            
            const select = document.getElementById('edit-cluster');
            select.innerHTML = '';
            Object.keys(scene.clusters).forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.textContent = c;
                if(c === node.cluster) opt.selected = true;
                select.appendChild(opt);
            });

            document.getElementById('editor').classList.add('active');
        }

        function saveNode() {
            const scene = getScene();
            const node = scene.nodes.find(n => n.id === activeNodeId);
            if (node) {
                node.label = document.getElementById('edit-name').value;
                node.notes = document.getElementById('edit-notes').value;
                const oldCluster = node.cluster;
                node.cluster = document.getElementById('edit-cluster').value;
                
                if (oldCluster !== node.cluster) {
                    scene.links = scene.links.filter(l => l.source !== node.id && l.target !== node.id);
                }
            }
            closeEditor();
            renderAll();
            saveData(); // Save edits
        }

        function deleteNode() {
            const scene = getScene();
            scene.nodes = scene.nodes.filter(n => n.id !== activeNodeId);
            scene.links = scene.links.filter(l => l.source !== activeNodeId && l.target !== activeNodeId);
            closeEditor();
            renderAll();
            saveData(); // Save deletion
        }

        function closeEditor() { document.getElementById('editor').classList.remove('active'); activeNodeId = null; }

        // Start App: Load saved data before initial render
        loadData();
        renderAll();
    </script>
</body>
</html>
